<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDC Office Screensaver</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden;
            cursor: none; /* Hide cursor for screensaver mode */
        }

        /* Digital Space Background Canvas */
        #space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* --- NEW: Floating Wrapper to prevent screen burn-in --- */
        .screensaver-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px; /* Space between clock and text */
            z-index: 10;
            /* Slow, random-looking floating animation */
            animation: floatAround 45s ease-in-out infinite alternate;
        }

        @keyframes floatAround {
            0%   { transform: translate(-4vw, -4vh); }
            33%  { transform: translate(4vw, 2vh); }
            66%  { transform: translate(-2vw, 4vh); }
            100% { transform: translate(3vw, -3vh); }
        }

        /* The Classic Clock */
        .clock-container {
            position: relative;
            width: 450px;
            height: 450px;
            background: #1a0f02;
            border-radius: 50%;
            border: 4px solid #3a220f;
            display: flex;
            justify-content: center;
            align-items: center;
            
            box-shadow: 
                0 0 50px rgba(0, 255, 255, 0.15), 
                0 0 100px rgba(0, 150, 255, 0.1),
                inset 0 10px 20px rgba(255,255,255,0.05),
                inset 0 -10px 20px rgba(0,0,0,0.8);
            
            animation: pulse-glow 6s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 30px rgba(0, 200, 255, 0.1), inset 0 10px 20px rgba(255,255,255,0.1); }
            100% { box-shadow: 0 0 70px rgba(0, 200, 255, 0.2), 0 0 120px rgba(0, 100, 255, 0.15), inset 0 10px 20px rgba(255,255,255,0.1); }
        }

        .clock-inner-rim {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, #fcfaf0 60%, #e8e2c8 100%);
            border: 8px solid #d4af37;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }

        /* Custom EDC Branding */
        .brand-text {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #222;
            z-index: 10;
        }

        .brand-text .name {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            font-family: Arial, sans-serif;
            color: #111;
        }

        .brand-text .location {
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 5px;
            color: black;
            font-family: Arial, sans-serif;
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: #0a0a0a;
            padding-top: 15px;
            z-index: 5;
        }

        .number span { display: inline-block; }

        .tick {
            position: absolute;
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .tick::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 0;
            width: 100%;
            height: 10px;
            background-color: #222;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px 10px 0 0;
            z-index: 15;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }

        .hour-hand { width: 10px; height: 110px; background: #111; margin-left: -5px; }
        .minute-hand { width: 6px; height: 160px; background: #222; margin-left: -3px; }
        
        .second-hand {
            width: 2px; height: 180px; background: #d32f2f;
            margin-left: -1px; z-index: 20;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }

        .second-hand::after {
            content: ''; position: absolute; top: 100%; left: 0;
            width: 2px; height: 40px; background: #d32f2f;
        }

        .center-pin {
            position: absolute; width: 20px; height: 20px; background: #d4af37;
            border: 2px solid #111; border-radius: 50%; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 25;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .glass-glare {
            position: absolute; top: 2%; left: 2%; width: 96%; height: 96%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 45%);
            pointer-events: none; z-index: 30;
        }

        /* Information Panel Styling */
        .info-panel {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
        }

        .date-display {
            font-size: 1.6rem;
            color: #00ffcc;
            letter-spacing: 4px;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .welcome-text {
            font-size: 2rem;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(0, 150, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <canvas id="space"></canvas>

    <div class="screensaver-content">
        <div class="clock-container">
            <div class="clock-inner-rim" id="clockFace">
                <div class="glass-glare"></div>
                <div class="brand-text">
                    <div class="name">EDC</div>
                    <div class="location">SIDDHARTHNAGAR</div>
                </div>
                <div class="hand hour-hand" id="hour"></div>
                <div class="hand minute-hand" id="minute"></div>
                <div class="hand second-hand" id="second"></div>
                <div class="center-pin"></div>
            </div>
        </div>

        <div class="info-panel">
            <div class="date-display" id="date">DAY | 00.00.0000</div>
            
        </div>
    </div>

    <script>
        // Digital Space Background Logic (Calmer Speed)
        const canvas = document.getElementById('space');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];
        const NUM_STARS = 350; 
        const SPEED = 0.4; // Slower, calmer ambient drift

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for(let i = 0; i < NUM_STARS; i++) {
            stars.push({
                x: Math.random() * width * 2 - width,
                y: Math.random() * height * 2 - height,
                z: Math.random() * width 
            });
        }

        function animateSpace() {
            ctx.fillStyle = 'rgba(2, 3, 8, 0.4)'; // Deeper, darker space trail
            ctx.fillRect(0, 0, width, height);
            
            const cx = width / 2;
            const cy = height / 2;

            stars.forEach(star => {
                star.z -= SPEED; 
                
                if (star.z <= 0) {
                    star.z = width;
                    star.x = Math.random() * width * 2 - width;
                    star.y = Math.random() * height * 2 - height;
                }

                const px = cx + (star.x / star.z) * cx;
                const py = cy + (star.y / star.z) * cx;
                const size = Math.max(0, (1 - star.z / width) * 2.2);

                // Corporate blue star tint
                ctx.fillStyle = 'rgba(150, 200, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateSpace);
        }
        animateSpace();

        // Classic Clock Logic
        const clockFace = document.getElementById('clockFace');

        for (let i = 1; i <= 12; i++) {
            let numDiv = document.createElement('div');
            numDiv.className = 'number';
            numDiv.style.transform = `rotate(${i * 30}deg)`;
            let spanDiv = document.createElement('span');
            spanDiv.style.transform = `rotate(-${i * 30}deg)`;
            spanDiv.innerText = i;
            numDiv.appendChild(spanDiv);
            clockFace.appendChild(numDiv);
        }

        for (let i = 0; i < 60; i++) {
            if (i % 5 !== 0) {
                let tickDiv = document.createElement('div');
                tickDiv.className = 'tick';
                tickDiv.style.transform = `rotate(${i * 6}deg)`;
                clockFace.appendChild(tickDiv);
            }
        }

        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');
        const dateElement = document.getElementById('date');

        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();
            const milliseconds = now.getMilliseconds(); 

            const secondsDegrees = (seconds * 6);
            const minutesDegrees = (minutes * 6) + (seconds * 0.1);
            const hoursDegrees = ((hours % 12) * 30) + (minutes * 0.5);

            secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
            minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;
            hourHand.style.transform = `rotate(${hoursDegrees}deg)`;

            // Expanded Date Formatting
            const dayName = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
            const dayStr = String(now.getDate()).padStart(2, '0');
            const monthStr = String(now.getMonth() + 1).padStart(2, '0'); 
            const yearStr = now.getFullYear();
            
            dateElement.innerText = `${dayName} | ${dayStr}.${monthStr}.${yearStr}`;
        }

        updateClock();
        setInterval(updateClock, 16); 
    </script>

</body>
</html>
